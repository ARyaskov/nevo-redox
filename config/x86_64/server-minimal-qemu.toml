# Minimal headless Redox profile for a small x86_64 QEMU or UEFI system.

[general]
prompt = false
filesystem_size = 320

[packages]
base = {}
base-initfs = {}
bootloader = {}
ca-certificates = {}
coreutils = {}
curl = {}
diffutils = {}
extrautils = {}
findutils = {}
gawk = {}
ion = {}
kernel = {}
libgcc = {}
libstdcxx = {}
netdb = {}
netutils = {}
nano = {}
openssl3 = {}
pkgutils = {}
relibc = {}
rsync = {}
sed = {}
userutils = {}
uutils = {}
vim = {}
wget = {}

[[files]]
path = "/usr/lib/init.d/00_base"
data = """
rm -rf /tmp
mkdir -m a=rwxt /tmp

notify ipcd
notify ptyd
nowait sudo --daemon
"""

[[files]]
path = "/usr/lib/init.d/00_drivers"
data = """
requires_weak 00_base
pcid-spawner
"""

[[files]]
path = "/usr/lib/init.d/10_net"
data = """
requires_weak 00_drivers
notify smolnetd
nowait dhcpd
"""

[[files]]
path = "/usr/lib/init.d/30_console"
data = """
requires_weak 10_net
inputd -A 2
nowait getty 2
nowait getty /scheme/debug/no-preserve -J
"""

[[files]]
path = "/etc/login_schemes.toml"
data = """
[user_schemes.root]
schemes = ["*"]
[user_schemes.user]
schemes = [
  "debug",
  "event",
  "memory",
  "pipe",
  "serio",
  "irq",
  "time",
  "sys",
  "rand",
  "null",
  "zero",
  "log",
  "ip",
  "icmp",
  "tcp",
  "udp",
  "shm",
  "chan",
  "uds_stream",
  "uds_dgram",
  "file",
  "pty",
  "sudo",
]
"""

[[files]]
path = "/etc/hostname"
data = "redox"

[[files]]
path = "/etc/net/dns"
data = """
9.9.9.9
"""

[[files]]
path = "/etc/net/ip"
data = """
10.0.2.15
"""

[[files]]
path = "/etc/net/ip_router"
data = """
10.0.2.2
"""

[[files]]
path = "/etc/net/ip_subnet"
data = """
255.255.255.0
"""

[[files]]
path = "/usr/lib/os-release"
data = """
PRETTY_NAME="Redox OS 0.9.0"
NAME="Redox OS"
VERSION_ID="0.9.0"
VERSION="0.9.0"
ID="redox-os"

HOME_URL="https://www.redox-os.org/"
DOCUMENTATION_URL="https://redox-os.org/docs/"
SUPPORT_URL="https://redox-os.org/community/"
"""

[[files]]
path = "/etc/os-release"
data = "../usr/lib/os-release"
symlink = true

[[files]]
path = "/etc/pkg.d/50_redox"
data = "https://static.redox-os.org/pkg"

[[files]]
path = "/usr"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/usr/bin"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/bin"
data = "usr/bin"
symlink = true

[[files]]
path = "/usr/include"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/include"
data = "usr/include"
symlink = true

[[files]]
path = "/usr/lib"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/lib"
data = "usr/lib"
symlink = true

[[files]]
path = "/usr/libexec"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/usr/share"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/share"
data = "usr/share"
symlink = true

[[files]]
path = "/var"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/var/cache"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/var/lib"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/var/lock"
data = ""
directory = true
mode = 0o1777

[[files]]
path = "/var/log"
data = ""
directory = true
mode = 0o755

[[files]]
path = "/var/run"
